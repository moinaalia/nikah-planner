name: nikah_planner
description: Nikah Planner — elegant Islamic-friendly wedding planning app for Android.
publish_to: 'none'
version: 2.4.1+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1
  fl_chart: ^0.69.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
